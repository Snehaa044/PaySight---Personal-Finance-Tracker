services:
  - type: web
    name: paysight-backend
    runtime: java
    buildCommand: mvn clean install
    startCommand: java -jar target/paysight-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: ${DATABASE_URL}
      - key: SPRING_DATASOURCE_USERNAME
        value: ${DATABASE_USER}
      - key: SPRING_DATASOURCE_PASSWORD
        value: ${DATABASE_PASSWORD}
      - key: JWT_SECRET
        generateValue: true